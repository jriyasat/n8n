name: News to Blog (Draft)

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC ~ 7am America/New_York (adjust for DST)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 trafilatura openai python-dotenv

      - name: Generate draft
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python news_to_blog.py

      - name: Create PR with draft
        run: |
          BRANCH="draft-$(date +%F)-$(date +%H%M)"
          git checkout -b "$BRANCH"
          git config user.name "news-to-blog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add drafts/
          git commit -m "Add draft post" || echo "No changes"
          git push --set-upstream origin "$BRANCH"
          gh pr create --title "Draft post ($BRANCH)" --body "Review the draft in /drafts. Merge this PR to approve publishing." || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
